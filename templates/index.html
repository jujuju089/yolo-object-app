<!DOCTYPE html>
<html>
<head>
<title>KI Fundbüro</title>
</head>
<body>

<h1>KI Fundbüro</h1>

<form method="post" enctype="multipart/form-data">
<input type="file" name="image" required>
<button type="submit">Bild hochladen</button>
</form>

{% if filename %}
<h2>Hochgeladenes Bild:</h2>
<img src="/uploads/{{ filename }}" width="300">
{% endif %}

{% if result %}
<h2>Erkannte Gegenstände:</h2>
<ul>
{% for obj in result %}
<li>{{ obj }}</li>
{% endfor %}
</ul>
{% endif %}

</body>
</html>
